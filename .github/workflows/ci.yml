name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install flake8 mypy

      - name: flake8
        run: python -m flake8 scratchv/ scratchv_dag/ tests/

      - name: mypy
        run: python -m mypy scratchv/ scratchv_dag/ --ignore-missing-imports

  coverage:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest-cov

      - name: Run tests with coverage
        run: python -m pytest tests/ --cov=scratchv --cov=scratchv_dag --cov-report=term --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  smoke:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"

      - name: Smoke test - DSL compilation
        run: |
          python -m scratchv examples/simple_add.dsl -o /tmp/simple_add.s --dump-ir
          python -m scratchv examples/relu_test.dsl -o /tmp/relu.s --optimize all
          python -m scratchv examples/matmul_test.dsl -o /tmp/matmul.s --optimize all
